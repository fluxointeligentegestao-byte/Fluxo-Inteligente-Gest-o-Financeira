<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="blueGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#003b7a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0072bc;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="greenGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4cae4c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5cb85c;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Main Blue Ring -->
  <path d="M256 30 C 131.2 30, 30 131.2, 30 256 S 131.2 482, 256 482 S 482 380.8, 482 256 S 380.8 30, 256 30 Z" fill="none" stroke="url(#blueGrad)" stroke-width="45" />
  
  <!-- Green Accent Curve -->
  <path d="M430 380 Q 450 256, 350 150 Q 256 50, 150 150 Q 50 256, 150 350 Q 256 450, 430 380" fill="none" stroke="url(#greenGrad)" stroke-width="35" stroke-linecap="round" />
  
  <!-- Bar Chart -->
  <rect x="180" y="270" width="35" height="80" rx="6" fill="#0072bc" />
  <rect x="235" y="210" width="35" height="140" rx="6" fill="#03a9f4" />
  <rect x="290" y="160" width="35" height="190" rx="6" fill="#4fc3f7" />
  
  <!-- Arrow -->
  <path d="M120 420 C 180 400, 320 300, 410 120" fill="none" stroke="#003b7a" stroke-width="40" stroke-linecap="round" />
  <path d="M360 120 L 410 120 L 410 170" fill="none" stroke="#003b7a" stroke-width="40" stroke-linecap="round" stroke-linejoin="round" />
</svg>
